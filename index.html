<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>研究生纪念网</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <p class="site-kicker">Graduate Memory Archive</p>
      <h1 id="siteTitle">研究生纪念网</h1>
      <p class="site-desc" id="siteDesc">
        记录、缅怀与发声。点击照片或姓名可查看完整故事。
      </p>
    </header>

    <main class="page-main">
      <section class="notice-panel">
        <p>
          本站为公开纪念页面，人物信息由站点维护者统一整理发布。页面评论区对所有访客开放。
        </p>
      </section>

      <section id="masonry" class="masonry" aria-live="polite"></section>
      <p id="loadingState" class="loading-state">正在加载人物资料...</p>
    </main>

    <footer class="site-footer">
      <p>愿每段努力都被看见，愿每个名字都被温柔记住。</p>
    </footer>

    <script src="js/main.js" defer></script>
  </body>
</html>
