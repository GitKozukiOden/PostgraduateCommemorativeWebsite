<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>研究生纪念网</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <p class="site-kicker">Graduate Memory Archive</p>
      <h1 id="siteTitle">研究生纪念网</h1>
      <p class="site-desc" id="siteDesc">
        记录、缅怀与发声。点击照片或姓名可查看完整故事。
      </p>
    </header>

    <main class="page-main">
      <section class="notice-panel">
        <p>
          本站为公开纪念页面，人物信息由站点维护者统一整理发布。页面评论区对所有访客开放。
        </p>
      </section>

      <section class="search-panel" aria-label="搜索人物与经历">
        <label class="search-label" for="searchInput">搜索人名或经历关键词</label>
        <div class="search-controls">
          <input
            id="searchInput"
            class="search-input"
            type="search"
            placeholder="例如：孙馨钰 / 临床压力"
          />
          <button id="searchButton" class="search-button" type="button">搜索</button>
          <button
            id="resetSearchButton"
            class="search-button search-return-button"
            type="button"
            hidden
          >
            返回主界面
          </button>
        </div>
        <p id="searchState" class="search-state" aria-live="polite"></p>
      </section>

      <section class="view-switch-panel" aria-label="人物展示样式">
        <span class="view-switch-label">展示样式</span>
        <div class="view-switch-controls">
          <button id="cardViewButton" class="view-switch-button is-active" type="button">
            卡片样式
          </button>
          <button id="listViewButton" class="view-switch-button" type="button">
            列表样式
          </button>
        </div>
      </section>

      <section id="masonry" class="masonry" aria-live="polite"></section>
      <p id="loadingState" class="loading-state">正在加载人物资料...</p>

      <section class="support-panel" aria-labelledby="supportTitle">
        <h2 id="supportTitle">支持这个纪念站</h2>
        <p class="support-text">如果你愿意支持网站维护，可以通过爱发电赞助。</p>
        <a
          class="support-link"
          href="https://ifdian.net/a/kozukioden"
          target="_blank"
          rel="noopener noreferrer"
        >
          前往爱发电支持
        </a>
        <p class="support-note">感谢你的支持与转发。</p>
      </section>
    </main>

    <footer class="site-footer">
      <p>愿每段努力都被看见，愿每个名字都被温柔记住。</p>
    </footer>

    <script src="js/main.js" defer></script>
  </body>
</html>
